<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta Digital</title>
  <meta name="description" content="Carta digital y reservas online">
  <meta name="theme-color" content="#f8f6f2">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- Botón de reserva fijo -->
  <a href="reservas.html" class="reservation-btn" id="reservation-btn">
    <i class="fas fa-calendar-check"></i>
    <span>Reservar</span>
    <i class="fas fa-arrow-right"></i>
  </a>

  <!-- ══ HERO ══════════════════════════════════════════════ -->
  <section class="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-particles" id="hero-particles"></div>
    <div class="hero-content">
      <img id="hero-logo" class="hero-logo" src="images/logo.png" alt="Logo">
      <p class="hero-tagline" id="hero-tagline"></p>
      <div class="hero-divider"><span></span><i class="fas fa-circle"></i><span></span></div>
      <p class="hero-address" id="hero-address"></p>
      <div class="hero-contacts" id="hero-contacts"></div>
    </div>
  </section>

  <!-- ══ SECCIÓN CARTA ═════════════════════════════════════ -->
  <div class="section-label">
    <h2>Nuestra Carta</h2>
    <div class="line"></div>
  </div>

  <!-- Redes sociales -->
  <div class="social-strip" id="social-strip"></div>

  <!-- Categorías (se genera dinámicamente) -->
  <div class="menu-sections" id="menu-sections"></div>

  <footer>
    <div class="footer-brand" id="footer-brand"></div>
    <p class="copyright" id="footer-copy"></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    // ── Aplicar config ──────────────────────────────────────
    document.title = APP_CONFIG.barName + ' · Carta';
    document.getElementById('hero-logo').alt = APP_CONFIG.barName;
    document.getElementById('hero-tagline').textContent  = APP_CONFIG.barTagline;
    document.getElementById('footer-brand').textContent  = APP_CONFIG.barName;
    document.getElementById('footer-copy').textContent   = `© ${new Date().getFullYear()} ${APP_CONFIG.barName} · Todos los derechos reservados`;

    // Dirección
    const addr = document.getElementById('hero-address');
    if (APP_CONFIG.barAddress) addr.textContent = `${APP_CONFIG.barAddress} · ${APP_CONFIG.barCity}`;

    // Teléfonos
    const contacts = document.getElementById('hero-contacts');
    [APP_CONFIG.barPhone, APP_CONFIG.barPhone2].filter(Boolean).forEach(p => {
      const a = document.createElement('a');
      a.href = `tel:${p.replace(/\s/g,'')}`;
      a.innerHTML = `<i class="fas fa-phone"></i> ${p}`;
      contacts.appendChild(a);
    });

    // Redes sociales
    const socialCfg = [
      { key: 'instagram',    icon: 'fab fa-instagram',    title: 'Instagram' },
      { key: 'facebook',     icon: 'fab fa-facebook',     title: 'Facebook'  },
      { key: 'whatsapp',     icon: 'fab fa-whatsapp',     title: 'WhatsApp'  },
      { key: 'googleReviews',icon: 'fab fa-google',       title: 'Reseñas'   },
    ];
    const strip = document.getElementById('social-strip');
    socialCfg.forEach(s => {
      if (!APP_CONFIG[s.key]) return;
      const a = document.createElement('a');
      a.href = APP_CONFIG[s.key]; a.target = '_blank'; a.rel = 'noopener';
      a.title = s.title; a.innerHTML = `<i class="${s.icon}"></i>`;
      strip.appendChild(a);
    });
    if (!strip.children.length) strip.style.display = 'none';

    // ── Cargar categorías desde BD o config ──────────────────
    const db = supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.supabaseKey);

    async function loadCategories() {
      let cats = APP_CONFIG.menuCategories;
      try {
        const { data } = await db.from('settings')
          .select('*').eq('key','menu_categories').eq('restaurant_id', APP_CONFIG.restaurantId).single();
        if (data?.value) cats = JSON.parse(data.value);
      } catch(e) {}
      renderCategories(cats);
    }

    function renderCategories(cats) {
      const container = document.getElementById('menu-sections');
      container.innerHTML = '';
      cats.forEach((cat, i) => {
        const a = document.createElement('a');
        a.href = cat.page || `${cat.id}.html`;
        a.className = 'category-card';
        a.style.setProperty('--i', i);
        a.innerHTML = `
          <div class="category-info">
            <h2>${cat.label}</h2>
            <span class="category-arrow">Ver carta <i class="fas fa-arrow-right"></i></span>
          </div>
          ${cat.img ? `<img class="category-image" src="${cat.img}" alt="${cat.label}" loading="lazy">` : ''}
        `;
        container.appendChild(a);
      });
    }

    // ── Partículas decorativas ───────────────────────────────
    const pContainer = document.getElementById('hero-particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 3 + 1;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        top:${Math.random()*100}%;
        --dur:${6+Math.random()*8}s;
        --delay:${Math.random()*6}s;
      `;
      pContainer.appendChild(p);
    }

    // ── Parallax hero ────────────────────────────────────────
    const heroBg = document.getElementById('hero-bg');
    window.addEventListener('scroll', () => {
      const scrolled = window.scrollY;
      heroBg.style.transform = `scale(1.05) translateY(${scrolled*0.25}px)`;
    }, { passive: true });

    // ── PWA service worker ───────────────────────────────────
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

    loadCategories();
  </script>
</body>
</html>
