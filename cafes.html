<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafes y Tes | Carta</title>
  <meta name="theme-color" content="#f8f6f2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="menu-items.css">
</head>
<body>

  <header class="menu-header">
    <a href="index.html" class="nav-back"><i class="fas fa-arrow-left"></i> Carta</a>
    <div class="header-logo">
      <img src="images/logo.png" alt="Logo" id="page-logo">
    </div>
  </header>

  <div class="section-intro">
    <h1 id="page-title">Cafes y Tes</h1>
    <p class="category-subtitle" id="page-subtitle"></p>
    <div class="divider"><span></span><i class="fas fa-circle"></i><span></span></div>
    <div class="search-bar-wrapper">
      <i class="fas fa-search"></i>
      <input type="text" id="menu-search" placeholder="Buscar plato...">
    </div>
  </div>

  <main class="menu-content" id="menu-content">
    <div class="no-results" id="no-results">
      <i class="fas fa-search"></i>
      <p>No se encontraron resultados</p>
    </div>
  </main>

  <footer class="menu-footer" id="menu-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    // ══ CONFIGURACIÓN DE ESTA PÁGINA ══════════════════════════
    // (estas constantes se reemplazan automáticamente por el script de generación)
    const PAGE_CATEGORY = 'cafes';
    const PAGE_TITLE    = 'Cafes y Tes';
    const PAGE_SUBTITLE = 'El mejor final';
    const PAGE_ICON     = 'fa-mug-hot';
    // ══════════════════════════════════════════════════════════

    const ALLERGEN_NAMES = {
      gluten:'Gluten',crustaceos:'Crustáceos',huevos:'Huevos',pescado:'Pescado',
      cacahuetes:'Cacahuetes',soja:'Soja',lacteos:'Lácteos',frutos_cascara:'Frutos secos',
      apio:'Apio',mostaza:'Mostaza',sesamo:'Sésamo',azufre:'Sulfitos',
      altramuces:'Altramuces',moluscos:'Moluscos',setas:'Setas',
    };

    document.title = `${PAGE_TITLE} | ${APP_CONFIG.barName}`;
    document.getElementById('page-logo').alt = APP_CONFIG.barName;
    document.getElementById('page-title').textContent   = PAGE_TITLE;
    if (PAGE_SUBTITLE) document.getElementById('page-subtitle').textContent = PAGE_SUBTITLE;
    document.getElementById('menu-footer').textContent  = `© ${new Date().getFullYear()} ${APP_CONFIG.barName}`;

    const db  = supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.supabaseKey);
    const RID = APP_CONFIG.restaurantId;

    async function loadProducts() {
      const { data, error } = await db
        .from('menu_items').select('*')
        .eq('category', PAGE_CATEGORY)
        .eq('restaurant_id', RID)
        .eq('visible', true)
        .order('position', { ascending: true });

      const container = document.getElementById('menu-content');
      const noResults = document.getElementById('no-results');

      if (error || !data || !data.length) {
        noResults.className = 'no-results visible';
        noResults.innerHTML = `<i class="fas fa-${PAGE_ICON}"></i><p>La carta está siendo preparada. Vuelve pronto.</p>`;
        return;
      }

      // Agrupar por subcategoría
      const groups = {};
      data.forEach(item => {
        const key = item.subcategory || '';
        if (!groups[key]) groups[key] = [];
        groups[key].push(item);
      });

      Object.entries(groups).forEach(([group, items]) => {
        if (group) {
          const h = document.createElement('h2');
          h.className = 'subcategory-title';
          h.textContent = group;
          container.appendChild(h);
        }
        items.forEach((item, idx) => {
          const allergens = item.allergens || {};
          const allergenBadges = Object.entries(allergens)
            .filter(([, v]) => v && ALLERGEN_NAMES[v] !== undefined)
            .map(([k]) => ALLERGEN_NAMES[k])
            .filter(Boolean)
            .map(name => `<span class="allergen-badge">${name}</span>`)
            .join('');

          // Soporte tanto para allergens:{gluten:true} como {gluten:true} plano
          const allergensBadgesFlat = Object.entries(allergens)
            .filter(([k, v]) => v === true && ALLERGEN_NAMES[k])
            .map(([k]) => `<span class="allergen-badge">${ALLERGEN_NAMES[k]}</span>`)
            .join('');

          const finalBadges = allergensBadgesFlat || allergenBadges;

          const div = document.createElement('div');
          div.className = 'menu-item';
          div.style.animationDelay = `${idx * 0.04}s`;
          div.dataset.name = item.name.toLowerCase();

          div.innerHTML = `
            ${item.image_url
              ? `<img src="${item.image_url}" alt="${item.name}" class="item-thumb" loading="lazy">`
              : `<div class="item-no-img"><i class="fas fa-${PAGE_ICON}"></i></div>`}
            <div class="item-body">
              <div class="item-header">
                <span class="item-name">
                  ${item.name}
                  ${item.is_sugerencia ? '<span class="sugerencia-label">★ Chef</span>' : ''}
                </span>
                <span class="item-price">${parseFloat(item.price).toFixed(2)} €</span>
              </div>
              ${item.info ? `<p class="item-info">${item.info}</p>` : ''}
              ${finalBadges ? `<div class="item-allergens"><span class="allergens-label">Alérgenos:</span>${finalBadges}</div>` : ''}
            </div>`;
          container.appendChild(div);
        });
      });

      // Búsqueda en tiempo real
      document.getElementById('menu-search').addEventListener('input', e => {
        const q = e.target.value.toLowerCase().trim();
        let visible = 0;
        document.querySelectorAll('.menu-item').forEach(el => {
          const show = !q || el.dataset.name.includes(q);
          el.style.display = show ? '' : 'none';
          if (show) visible++;
        });
        document.querySelectorAll('.subcategory-title').forEach(h => h.style.display = q ? 'none' : '');
        noResults.style.display = visible === 0 ? 'block' : 'none';
      });
    }

    // Toggle alérgenos
    const showAll = localStorage.getItem('showAllergens') === 'true';
    if (showAll) document.body.classList.add('show-allergens');
    const toggleBtn = document.createElement('button');
    toggleBtn.className = `toggle-allergens-btn${showAll ? ' active' : ''}`;
    toggleBtn.innerHTML = '<i class="fas fa-wheat-awn"></i>';
    toggleBtn.title = 'Mostrar/Ocultar Alérgenos';
    toggleBtn.onclick = () => {
      const active = document.body.classList.toggle('show-allergens');
      toggleBtn.classList.toggle('active', active);
      localStorage.setItem('showAllergens', active);
    };
    document.body.appendChild(toggleBtn);

    loadProducts();
  </script>
</body>
</html>
